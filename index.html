<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ DeepSeek 世界杯预测 · 全玩法</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { font-family: 'Space Grotesk', sans-serif; }
        body { background: #f8fafc; transition: 0.3s; }
        body.dark-mode { background: #0b0f19; color: #e2e8f0; }
        .glass-card { background: rgba(255,255,255,0.75); backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.3); }
        body.dark-mode .glass-card { background: rgba(20,30,50,0.7); border-color: rgba(255,255,255,0.05); }
        .odds-badge { background: #1e293b; color: #facc15; padding: 2px 8px; border-radius: 12px; font-size: 0.65rem; }
        .pred-tag { padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .summary-table td, .summary-table th { padding: 8px; text-align: center; border-bottom: 1px solid #e5e7eb; }
        body.dark-mode .summary-table td, body.dark-mode .summary-table th { border-color: #374151; }
    </style>
</head>
<body>
<nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-md border-b border-gray-200 dark:bg-gray-900/80 dark:border-gray-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
            <div class="flex items-center space-x-2">
                <span class="text-2xl">⚽</span>
                <span class="font-bold text-xl text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600">DeepSeek 世界杯 · 全玩法预测</span>
                <span class="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full">在线版</span>
            </div>
            <div>
                <button id="themeToggle" class="p-2 rounded-full bg-gray-100 dark:bg-gray-800 hover:bg-gray-200">
                    <i id="themeIcon" class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- 头部 -->
    <div class="text-center mb-8">
        <h1 class="text-3xl md:text-4xl font-bold text-gray-800 dark:text-white">
            🧠 DeepSeek <span class="text-blue-600">多玩法 AI 推演</span>
        </h1>
        <p class="text-gray-500 dark:text-gray-400 mt-1 text-sm">
            <i class="far fa-calendar-alt"></i> 模拟数据 · 2026-06-17
            <span class="mx-2">|</span>
            <span class="bg-yellow-100 dark:bg-yellow-900/30 text-yellow-700 dark:text-yellow-300 px-2 py-0.5 rounded-full text-xs">实时生成</span>
        </p>
    </div>

    <!-- 比赛列表（每场卡片包含多玩法） -->
    <div id="matchList" class="space-y-6"></div>

    <!-- 汇总表 -->
    <div id="summarySection" class="mt-10 glass-card rounded-2xl p-6 shadow-sm">
        <h2 class="text-xl font-bold text-gray-800 dark:text-white mb-4">📊 预测汇总</h2>
        <div id="summaryTableContainer"></div>
    </div>
</main>

<script>
// ---------- 深色模式 ----------
(function() {
    let theme = 'light';
    try {
        const saved = localStorage.getItem('theme');
        if (saved === 'dark' || saved === 'light') theme = saved;
        else if (window.matchMedia?.('(prefers-color-scheme: dark)').matches) theme = 'dark';
    } catch(e) {}
    document.body.classList.toggle('dark-mode', theme === 'dark');
    document.getElementById('themeIcon').className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
})();
document.getElementById('themeToggle').addEventListener('click', function() {
    const body = document.body;
    const icon = document.getElementById('themeIcon');
    const isDark = body.classList.toggle('dark-mode');
    icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
});

// ---------- 模拟比赛数据（可自行修改） ----------
const matchData = [
    { home: '巴西', away: '阿根廷', homeScore: 2, awayScore: 1, time: '03:00', odds: { win: 1.85, draw: 3.40, lose: 4.20, handicap: '-0.5', h_odds: 2.05, d_odds: 3.30, a_odds: 3.80 } },
    { home: '法国', away: '英格兰', homeScore: 1, awayScore: 1, time: '06:00', odds: { win: 2.30, draw: 3.10, lose: 3.00, handicap: '0', h_odds: 2.50, d_odds: 3.20, a_odds: 2.80 } },
    { home: '德国', away: '西班牙', homeScore: 2, awayScore: 3, time: '09:00', odds: { win: 2.60, draw: 3.20, lose: 2.70, handicap: '+0.5', h_odds: 1.95, d_odds: 3.40, a_odds: 3.60 } },
    { home: '葡萄牙', away: '荷兰', homeScore: 0, awayScore: 2, time: '12:00', odds: { win: 2.15, draw: 3.30, lose: 3.20, handicap: '-0.25', h_odds: 2.30, d_odds: 3.20, a_odds: 3.10 } },
    { home: '意大利', away: '比利时', homeScore: 1, awayScore: 0, time: '15:00', odds: { win: 2.45, draw: 3.00, lose: 2.90, handicap: '0', h_odds: 2.60, d_odds: 3.10, a_odds: 2.70 } }
];
const flagMap = {
    '巴西': '🇧🇷', '阿根廷': '🇦🇷', '法国': '🇫🇷', '英格兰': '🏴󠁧󠁢󠁥󠁮󠁧󠁿',
    '德国': '🇩🇪', '西班牙': '🇪🇸', '葡萄牙': '🇵🇹', '荷兰': '🇳🇱',
    '意大利': '🇮🇹', '比利时': '🇧🇪'
};

// ---------- 调用后端 API（多玩法） ----------
async function fetchPredictions(home, away, odds) {
    try {
        const resp = await fetch('/api/predict', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ home, away, odds })
        });
        const result = await resp.json();
        if (!result.success) throw new Error(result.error);
        return result.data; // { win_draw_lose, handicap, total_goals, half_full, correct_score }
    } catch (e) {
        return {
            win_draw_lose: { prediction: '服务异常', analysis: e.message },
            handicap: { prediction: '服务异常', analysis: '' },
            total_goals: { prediction: '服务异常', analysis: '' },
            half_full: { prediction: '服务异常', analysis: '' },
            correct_score: { prediction: '服务异常', analysis: '' }
        };
    }
}

// ---------- 渲染 ----------
async function renderMatches() {
    const container = document.getElementById('matchList');
    container.innerHTML = matchData.map((m, i) => `
        <div id="card-${i}" class="glass-card rounded-xl p-5 shadow-sm border border-gray-100/50 dark:border-gray-700/30">
            <div class="flex flex-wrap items-center gap-3 mb-2">
                <span class="text-2xl">${flagMap[m.home]}</span>
                <span class="font-bold text-gray-800 dark:text-white">${m.home}</span>
                <span class="text-2xl font-black text-gray-800 dark:text-white">${m.homeScore}</span>
                <span class="text-xl text-gray-400">:</span>
                <span class="text-2xl font-black text-gray-800 dark:text-white">${m.awayScore}</span>
                <span class="text-2xl">${flagMap[m.away]}</span>
                <span class="font-bold text-gray-800 dark:text-white">${m.away}</span>
                <span class="text-xs text-gray-400">${m.time}</span>
            </div>
            <!-- 赔率展示 -->
            <div class="bg-gray-50 dark:bg-gray-800/30 p-2 rounded-lg grid grid-cols-2 sm:grid-cols-5 gap-1 text-xs mb-3">
                <div><span class="font-semibold">胜</span> ${m.odds.win}</div>
                <div><span class="font-semibold">平</span> ${m.odds.draw}</div>
                <div><span class="font-semibold">负</span> ${m.odds.lose}</div>
                <div><span class="font-semibold">让球</span> ${m.odds.handicap}</div>
                <div><span class="font-semibold">大小球</span> 2.5</div>
            </div>
            <!-- 预测结果占位 -->
            <div id="pred-${i}" class="space-y-1 text-sm">
                <div class="flex flex-wrap gap-2"><span class="font-medium">胜平负：</span><span id="spf-${i}" class="text-gray-400">预测中...</span></div>
                <div class="flex flex-wrap gap-2"><span class="font-medium">让球胜平负：</span><span id="rq-${i}" class="text-gray-400">预测中...</span></div>
                <div class="flex flex-wrap gap-2"><span class="font-medium">总进球：</span><span id="tg-${i}" class="text-gray-400">预测中...</span></div>
                <div class="flex flex-wrap gap-2"><span class="font-medium">半全场：</span><span id="hf-${i}" class="text-gray-400">预测中...</span></div>
                <div class="flex flex-wrap gap-2"><span class="font-medium">正确比分：</span><span id="cs-${i}" class="text-gray-400">预测中...</span></div>
            </div>
        </div>
    `).join('');

    // 收集预测结果用于汇总
    let allPredictions = [];

    for (let i = 0; i < matchData.length; i++) {
        const m = matchData[i];
        const preds = await fetchPredictions(m.home, m.away, m.odds);
        // 更新DOM
        document.getElementById(`spf-${i}`).innerHTML = `<span class="pred-tag bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-300">${preds.win_draw_lose.prediction}</span> <span class="text-gray-500">${preds.win_draw_lose.analysis}</span>`;
        document.getElementById(`rq-${i}`).innerHTML = `<span class="pred-tag bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-300">${preds.handicap.prediction}</span> <span class="text-gray-500">${preds.handicap.analysis}</span>`;
        document.getElementById(`tg-${i}`).innerHTML = `<span class="pred-tag bg-purple-100 text-purple-700 dark:bg-purple-900/30 dark:text-purple-300">${preds.total_goals.prediction}</span> <span class="text-gray-500">${preds.total_goals.analysis}</span>`;
        document.getElementById(`hf-${i}`).innerHTML = `<span class="pred-tag bg-yellow-100 text-yellow-700 dark:bg-yellow-900/30 dark:text-yellow-300">${preds.half_full.prediction}</span> <span class="text-gray-500">${preds.half_full.analysis}</span>`;
        document.getElementById(`cs-${i}`).innerHTML = `<span class="pred-tag bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-300">${preds.correct_score.prediction}</span> <span class="text-gray-500">${preds.correct_score.analysis}</span>`;

        // 保存用于汇总
        allPredictions.push({
            home: m.home, away: m.away,
            actual: `${m.homeScore}:${m.awayScore}`,
            spf_pred: preds.win_draw_lose.prediction,
            rq_pred: preds.handicap.prediction,
            tg_pred: preds.total_goals.prediction,
            hf_pred: preds.half_full.prediction,
            cs_pred: preds.correct_score.prediction
        });
    }

    // 渲染汇总表（延迟一下等DOM更新）
    setTimeout(() => renderSummary(allPredictions), 500);
}

// ---------- 汇总表 ----------
function renderSummary(predictions) {
    const container = document.getElementById('summaryTableContainer');
    // 模拟“正确”判断（实际需要与真实结果比较，这里简单演示）
    // 真实结果我们已知：matchData中的比分
    const results = matchData.map(m => ({ home: m.home, away: m.away, actual: `${m.homeScore}:${m.awayScore}` }));
    let stats = {
        spf: { correct: 0, total: 0 },
        rq: { correct: 0, total: 0 },
        tg: { correct: 0, total: 0 },
        hf: { correct: 0, total: 0 },
        cs: { correct: 0, total: 0 }
    };
    // 简单的正确判断逻辑（仅演示，实际需根据玩法定义）
    predictions.forEach((p, idx) => {
        const actual = results[idx].actual;
        // 胜平负：根据实际比分判断
        const [h, a] = actual.split(':').map(Number);
        let actualSPF = '';
        if (h > a) actualSPF = '主队胜';
        else if (h < a) actualSPF = '客队胜';
        else actualSPF = '平局';
        if (p.spf_pred === actualSPF) stats.spf.correct++;
        stats.spf.total++;

        // 让球胜平负：假设让球为0（简化），实际应依据赔率中的handicap
        // 这里简单用实际胜平负代替
        if (p.rq_pred === actualSPF) stats.rq.correct++;
        stats.rq.total++;

        // 总进球：判断是否大于2.5（假设盘口2.5）
        const totalGoals = h + a;
        let actualTG = totalGoals > 2.5 ? '大球' : '小球';
        if (p.tg_pred === actualTG) stats.tg.correct++;
        stats.tg.total++;

        // 半全场：简化，用胜平负
        if (p.hf_pred === actualSPF) stats.hf.correct++;
        stats.hf.total++;

        // 正确比分
        if (p.cs_pred === actual) stats.cs.correct++;
        stats.cs.total++;
    });

    // 构建表格
    let html = `
        <table class="summary-table w-full text-sm">
            <thead><tr class="bg-gray-100 dark:bg-gray-800">
                <th>玩法</th><th>预测正确场次</th><th>总场次</th><th>正确率</th>
            </tr></thead>
            <tbody>
                <tr><td>胜平负</td><td>${stats.spf.correct}</td><td>${stats.spf.total}</td><td>${(stats.spf.correct/stats.spf.total*100).toFixed(1)}%</td></tr>
                <tr><td>让球胜平负</td><td>${stats.rq.correct}</td><td>${stats.rq.total}</td><td>${(stats.rq.correct/stats.rq.total*100).toFixed(1)}%</td></tr>
                <tr><td>总进球</td><td>${stats.tg.correct}</td><td>${stats.tg.total}</td><td>${(stats.tg.correct/stats.tg.total*100).toFixed(1)}%</td></tr>
                <tr><td>半全场</td><td>${stats.hf.correct}</td><td>${stats.hf.total}</td><td>${(stats.hf.correct/stats.hf.total*100).toFixed(1)}%</td></tr>
                <tr><td>正确比分</td><td>${stats.cs.correct}</td><td>${stats.cs.total}</td><td>${(stats.cs.correct/stats.cs.total*100).toFixed(1)}%</td></tr>
            </tbody>
        </table>
    `;
    container.innerHTML = html;
}

renderMatches();
</script>
</body>
</html>
