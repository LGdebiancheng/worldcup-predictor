<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ DeepSeek 世界杯预测 · 智能推演</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #f1f5f9; padding: 20px; max-width: 1400px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #e2e8f0;
            overflow-x: auto;
        }
        h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        th {
            background: #f8fafc;
            text-align: left;
            padding: 10px 8px;
            border-bottom: 2px solid #e2e8f0;
            font-weight: 600;
            white-space: nowrap;
        }
        td {
            padding: 10px 8px;
            border-bottom: 1px solid #e2e8f0;
            vertical-align: middle;
        }
        .flag { font-size: 1.2rem; margin-right: 4px; }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-green { background: #dcfce7; color: #166534; }
        .badge-red { background: #fee2e2; color: #991b1b; }
        .badge-yellow { background: #fef9c3; color: #854d0e; }
        .badge-gray { background: #e5e7eb; color: #4b5563; }
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-top: 10px; }
        .summary-item { background: #f8fafc; padding: 10px; border-radius: 10px; text-align: center; }
        .summary-item .rate { font-size: 1.5rem; font-weight: 700; }
        .summary-item .label { font-size: 0.7rem; color: #64748b; }
        .highlight { border: 3px solid #f59e0b; background: #fffbeb; }
        .caption-text { font-size: 0.75rem; color: #94a3b8; margin-top: 8px; text-align: center; }
        .info-line { margin-top: 10px; font-size: 0.85rem; color: #475569; display: flex; gap: 10px; flex-wrap: wrap; }
        .footer-note { text-align: center; font-size: 0.75rem; color: #94a3b8; padding: 20px 0; }
        .loading { text-align: center; padding: 40px; color: #94a3b8; }
        .error { color: #dc2626; }
        .count-badge {
            background: #3b82f6;
            color: white;
            padding: 4px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            display: inline-block;
            margin-right: 15px;
        }
        .best-badge {
            background: #f59e0b;
            color: white;
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
        }
        .top-bar {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .attempt-info {
            font-size: 0.7rem;
            color: #6b7280;
            margin-left: 6px;
        }
        .profit-positive { color: #16a34a; font-weight: 600; }
        .profit-negative { color: #dc2626; font-weight: 600; }
        .profit-zero { color: #6b7280; }
        .daily-summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 8px;
            margin-top: 8px;
        }
        .daily-item {
            background: #f8fafc;
            padding: 6px 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.8rem;
        }
        .daily-item .date { font-weight: 600; }
        .daily-item .amount { font-weight: 700; }
    </style>
</head>
<body>

<div id="app">
    <div class="loading">⏳ 加载数据中...</div>
</div>

<script>
// ---------- 国旗与中文名称映射 ----------
const flagMap = {
    'Brazil': '🇧🇷', 'Argentina': '🇦🇷', 'France': '🇫🇷', 'England': '🏴󠁧󠁢󠁥󠁮󠁧󠁿',
    'Germany': '🇩🇪', 'Spain': '🇪🇸', 'Portugal': '🇵🇹', 'Netherlands': '🇳🇱',
    'Italy': '🇮🇹', 'Belgium': '🇧🇪', 'Mexico': '🇲🇽', 'Uruguay': '🇺🇾',
    'Croatia': '🇭🇷', 'Denmark': '🇩🇰', 'Switzerland': '🇨🇭', 'USA': '🇺🇸',
    'Senegal': '🇸🇳', 'Japan': '🇯🇵', 'South Korea': '🇰🇷', 'Australia': '🇦🇺',
    'Ecuador': '🇪🇨', 'Ghana': '🇬🇭', 'Morocco': '🇲🇦', 'Nigeria': '🇳🇬',
    'Serbia': '🇷🇸', 'Poland': '🇵🇱', 'Ukraine': '🇺🇦', 'Austria': '🇦🇹',
    'Wales': '🏴󠁧󠁢󠁷󠁬󠁳󠁿', 'Scotland': '🏴󠁧󠁢󠁳󠁣󠁴󠁿', 'Czech Republic': '🇨🇿', 'South Africa': '🇿🇦',
    'Canada': '🇨🇦', 'New Zealand': '🇳🇿', 'Costa Rica': '🇨🇷', 'Panama': '🇵🇦',
    'Saudi Arabia': '🇸🇦', 'Iran': '🇮🇷', 'Qatar': '🇶🇦', 'Cameroon': '🇨🇲',
    'Sweden': '🇸🇪'
};
const nameMap = {
    'Brazil': '巴西', 'Argentina': '阿根廷', 'France': '法国', 'England': '英格兰',
    'Germany': '德国', 'Spain': '西班牙', 'Portugal': '葡萄牙', 'Netherlands': '荷兰',
    'Italy': '意大利', 'Belgium': '比利时', 'Mexico': '墨西哥', 'Uruguay': '乌拉圭',
    'Croatia': '克罗地亚', 'Denmark': '丹麦', 'Switzerland': '瑞士', 'USA': '美国',
    'Senegal': '塞内加尔', 'Japan': '日本', 'South Korea': '韩国', 'Australia': '澳大利亚',
    'Ecuador': '厄瓜多尔', 'Ghana': '加纳', 'Morocco': '摩洛哥', 'Nigeria': '尼日利亚',
    'Serbia': '塞尔维亚', 'Poland': '波兰', 'Ukraine': '乌克兰', 'Austria': '奥地利',
    'Wales': '威尔士', 'Scotland': '苏格兰', 'Czech Republic': '捷克', 'South Africa': '南非',
    'Canada': '加拿大', 'New Zealand': '新西兰', 'Costa Rica': '哥斯达黎加', 'Panama': '巴拿马',
    'Saudi Arabia': '沙特', 'Iran': '伊朗', 'Qatar': '卡塔尔', 'Cameroon': '喀麦隆',
    'Sweden': '瑞典'
};

// ---------- 赔率配置 ----------
const ODDS_CONFIG = {
    '胜平负': {
        '主队胜': 2.0,
        '平局': 3.0,
        '客队胜': 2.5
    },
    '让球胜平负': {
        '主队赢盘': 1.9,
        '走盘': 3.2,
        '客队赢盘': 2.0
    },
    '总进球数': { default: 2.0 },
    '半全场': { default: 3.0 },
    '正确比分': { default: 6.0 }
};

function getOddsForMethod(method, prediction) {
    const config = ODDS_CONFIG[method];
    if (!config) return 1.0;
    if (config[prediction]) return config[prediction];
    if (config.default) return config.default;
    return 1.0;
}

// ---------- 计算投注盈亏 ----------
function calculateBetProfit(method, prediction, actualScore) {
    let correct = false;
    const [h, a] = actualScore.split(':').map(Number);
    const actualSPF = h > a ? '主队胜' : (h < a ? '客队胜' : '平局');
    const total = h + a;

    if (method === '胜平负') {
        correct = (prediction === actualSPF);
    } else if (method === '让球胜平负') {
        const map = { '主队赢盘': '主队胜', '走盘': '平局', '客队赢盘': '客队胜' };
        const mapped = map[prediction] || prediction;
        correct = (mapped === actualSPF);
    } else if (method === '总进球数') {
        const predNum = parseInt(prediction);
        correct = (!isNaN(predNum) && predNum === total);
    } else if (method === '半全场') {
        const prefix = prediction.charAt(0);
        let predSPF = '';
        if (prefix === '胜') predSPF = '主队胜';
        else if (prefix === '负') predSPF = '客队胜';
        else if (prefix === '平') predSPF = '平局';
        correct = (predSPF === actualSPF);
    } else if (method === '正确比分') {
        correct = (prediction === actualScore);
    }

    const odds = getOddsForMethod(method, prediction);
    const stake = 100;
    return correct ? stake * (odds - 1) : -stake;
}

// ---------- API 调用 ----------
async function fetchMatches() {
    const resp = await fetch('/api/matches');
    return resp.json();
}

async function fetchPrediction(home, away, matchId) {
    const resp = await fetch('/api/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ home, away, matchId })
    });
    return resp.json();
}

async function fetchOptimalPrediction(home, away, actualScore, matchId) {
    const resp = await fetch('/api/predict_optimal', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ home, away, actualScore, matchId })
    });
    return resp.json();
}

// ---------- 核心逻辑 ----------
async function init() {
    const app = document.getElementById('app');
    try {
        const data = await fetchMatches();
        if (!data.success) throw new Error(data.error || '获取数据失败');

        let finished = data.finished || [];
        let upcoming = data.upcoming || [];

        // 降级
        if (finished.length === 0 && upcoming.length === 0) {
            finished = [
                { home: '巴西', away: '阿根廷', homeScore: 2, awayScore: 1, time: '03:00', status: 'FINISHED', date: '2026-06-17T03:00:00Z' },
                { home: '法国', away: '英格兰', homeScore: 1, awayScore: 1, time: '06:00', status: 'FINISHED', date: '2026-06-17T06:00:00Z' },
                { home: '德国', away: '西班牙', homeScore: 2, awayScore: 3, time: '09:00', status: 'FINISHED', date: '2026-06-17T09:00:00Z' },
                { home: '葡萄牙', away: '荷兰', homeScore: 0, awayScore: 2, time: '12:00', status: 'FINISHED', date: '2026-06-17T12:00:00Z' },
                { home: '意大利', away: '比利时', homeScore: 1, awayScore: 0, time: '15:00', status: 'FINISHED', date: '2026-06-17T15:00:00Z' }
            ];
            upcoming = [
                { home: '美国', away: '墨西哥', homeScore: null, awayScore: null, time: '18:00', status: 'SCHEDULED', date: '2026-06-17T18:00:00Z' },
                { home: '日本', away: '韩国', homeScore: null, awayScore: null, time: '21:00', status: 'SCHEDULED', date: '2026-06-17T21:00:00Z' }
            ];
        }

        // ---------- 1. 已完赛最优预测 ----------
        const finishedPredictions = [];
        let globalTotalAttempts = 0;
        for (const match of finished) {
            const home = nameMap[match.home] || match.home;
            const away = nameMap[match.away] || match.away;
            const actualScore = `${match.homeScore}:${match.awayScore}`;
            const matchId = `${home}_${away}_${match.date}`;
            const result = await fetchOptimalPrediction(home, away, actualScore, matchId);
            if (result.success) {
                globalTotalAttempts = result.totalAttempts || globalTotalAttempts;
                finishedPredictions.push({
                    match: match,
                    home: home,
                    away: away,
                    pred: result.data,
                    attempt: result.attempt,
                    totalAttempts: result.totalAttempts,
                    score: result.score,
                    cached: result.cached || false
                });
            } else {
                console.warn(`最优预测失败: ${home} vs ${away}`, result.error);
                const fallback = await fetchPrediction(home, away, `${home}_${away}_fallback`);
                if (fallback.success) {
                    finishedPredictions.push({
                        match: match,
                        home: home,
                        away: away,
                        pred: fallback.data,
                        attempt: 1,
                        totalAttempts: globalTotalAttempts || 1,
                        score: 0,
                        cached: false
                    });
                }
            }
        }

        // ---------- 2. 统计各玩法正确率 ----------
        const methods = ['胜平负', '让球胜平负', '总进球数', '半全场', '正确比分'];
        const stats = {};
        methods.forEach(m => stats[m] = { correct: 0, total: 0 });

        finishedPredictions.forEach((item) => {
            const actual = `${item.match.homeScore}:${item.match.awayScore}`;
            const [h, a] = actual.split(':').map(Number);
            const actualSPF = h > a ? '主队胜' : (h < a ? '客队胜' : '平局');
            const totalActual = h + a;
            const pred = item.pred;

            const isSPF = pred.win_draw_lose.prediction === actualSPF;
            stats['胜平负'].correct += isSPF ? 1 : 0;
            stats['胜平负'].total++;

            const isRQ = pred.handicap.prediction === actualSPF;
            stats['让球胜平负'].correct += isRQ ? 1 : 0;
            stats['让球胜平负'].total++;

            const predTotal = parseInt(pred.total_goals.prediction);
            const isTG = !isNaN(predTotal) && predTotal === totalActual;
            stats['总进球数'].correct += isTG ? 1 : 0;
            stats['总进球数'].total++;

            const isHF = pred.half_full.prediction === actualSPF;
            stats['半全场'].correct += isHF ? 1 : 0;
            stats['半全场'].total++;

            const isCS = pred.correct_score.prediction === actual;
            stats['正确比分'].correct += isCS ? 1 : 0;
            stats['正确比分'].total++;
        });

        const rates = {};
        let bestMethod = '胜平负';
        let bestRate = 0;
        for (const method of methods) {
            const total = stats[method].total || 1;
            const rate = stats[method].correct / total;
            rates[method] = rate;
            if (rate > bestRate) {
                bestRate = rate;
                bestMethod = method;
            }
        }

        // ---------- 3. 未完赛预测（最多6场） ----------
        const upcomingLimit = 6;
        const upcomingPredictions = [];
        const upcomingSlice = upcoming.slice(0, upcomingLimit);
        for (const match of upcomingSlice) {
            const home = nameMap[match.home] || match.home;
            const away = nameMap[match.away] || match.away;
            const matchId = `upcoming_${home}_${away}_${match.date}`;
            const result = await fetchPrediction(home, away, matchId);
            if (result.success) {
                upcomingPredictions.push({
                    match: match,
                    home: home,
                    away: away,
                    pred: result.data,
                    bestMethod: bestMethod
                });
            } else {
                console.warn(`预测失败: ${home} vs ${away}`, result.error);
            }
        }

        // ---------- 4. 投注记录 ----------
        const betRecords = [];
        finishedPredictions.forEach((item) => {
            const match = item.match;
            const actualScore = `${match.homeScore}:${match.awayScore}`;
            const date = match.date ? match.date.substring(0,10) : '2026-06-17';
            methods.forEach(method => {
                let prediction = '';
                switch(method) {
                    case '胜平负': prediction = item.pred.win_draw_lose.prediction; break;
                    case '让球胜平负': prediction = item.pred.handicap.prediction; break;
                    case '总进球数': prediction = item.pred.total_goals.prediction; break;
                    case '半全场': prediction = item.pred.half_full.prediction; break;
                    case '正确比分': prediction = item.pred.correct_score.prediction; break;
                }
                const profit = calculateBetProfit(method, prediction, actualScore);
                const odds = getOddsForMethod(method, prediction);
                betRecords.push({
                    date: date,
                    match: `${item.home} vs ${item.away}`,
                    method: method,
                    prediction: prediction,
                    actual: actualScore,
                    correct: profit > 0,
                    odds: odds,
                    profit: profit
                });
            });
        });

        // 汇总
        let totalProfit = 0;
        const methodProfits = {};
        const dailyProfits = {};
        methods.forEach(m => methodProfits[m] = 0);
        betRecords.forEach(rec => {
            totalProfit += rec.profit;
            methodProfits[rec.method] += rec.profit;
            if (!dailyProfits[rec.date]) dailyProfits[rec.date] = 0;
            dailyProfits[rec.date] += rec.profit;
        });

        // ---------- 5. 渲染 ----------
        renderApp(finishedPredictions, upcomingPredictions, stats, bestMethod, rates, finishedPredictions.length, betRecords, totalProfit, methodProfits, dailyProfits, globalTotalAttempts);

    } catch (error) {
        app.innerHTML = `<div class="card"><p class="error">❌ 加载失败: ${error.message}</p></div>`;
        console.error(error);
    }
}

// ---------- 渲染函数 ----------
function renderApp(finished, upcoming, stats, bestMethod, rates, totalPredicted, betRecords, totalProfit, methodProfits, dailyProfits, globalTotalAttempts) {
    const app = document.getElementById('app');
    let html = '';

    // ---------- 投注汇总 ----------
    html += `
        <div class="card" style="border: 2px solid #3b82f6;">
            <h2>💰 投注模拟汇总（每玩法每场下注 100 元）</h2>
            <div style="display: flex; flex-wrap: wrap; gap: 20px; margin-top: 10px;">
                <div style="background: #f8fafc; padding: 12px 20px; border-radius: 12px;">
                    <div style="font-size: 0.75rem; color: #64748b;">总盈亏</div>
                    <div style="font-size: 1.8rem; font-weight: 700; ${totalProfit >= 0 ? 'color: #16a34a;' : 'color: #dc2626;'}">${totalProfit >= 0 ? '+' : ''}${totalProfit.toFixed(0)} 元</div>
                </div>
                ${Object.entries(methodProfits).map(([method, profit]) => `
                    <div style="background: #f8fafc; padding: 12px 16px; border-radius: 12px;">
                        <div style="font-size: 0.7rem; color: #64748b;">${method}</div>
                        <div style="font-size: 1.2rem; font-weight: 600; ${profit >= 0 ? 'color: #16a34a;' : 'color: #dc2626;'}">${profit >= 0 ? '+' : ''}${profit.toFixed(0)}</div>
                    </div>
                `).join('')}
            </div>
            <div style="margin-top: 12px;">
                <div style="font-size: 0.8rem; color: #475569; margin-bottom: 4px;">每日盈亏</div>
                <div class="daily-summary-grid">
                    ${Object.entries(dailyProfits).sort((a,b) => a[0].localeCompare(b[0])).map(([date, profit]) => `
                        <div class="daily-item">
                            <div class="date">${date}</div>
                            <div class="amount ${profit >= 0 ? 'profit-positive' : 'profit-negative'}">${profit >= 0 ? '+' : ''}${profit.toFixed(0)}</div>
                        </div>
                    `).join('')}
                </div>
            </div>
            <div style="margin-top: 12px; font-size:0.8rem; color:#94a3b8;">
                * 基于已完赛比赛的预测结果模拟投注，赔率为模拟值，仅供参考
            </div>
        </div>
    `;

    // ---------- 推演统计 ----------
    html += `
        <div class="card" style="text-align:center; padding:15px;">
            <div class="top-bar" style="justify-content:center;">
                <span class="count-badge">🧠 全局推演次数：${globalTotalAttempts || 0}</span>
                <span class="count-badge" style="background:#10b981;">📊 已完赛场次：${totalPredicted}</span>
                <span class="best-badge">🏆 最佳推演方法：${bestMethod}</span>
                <span style="font-size:0.9rem; color:#475569;">
                    正确率 ${(rates[bestMethod] * 100).toFixed(0)}%
                </span>
            </div>
            <div style="margin-top:8px; font-size:0.8rem; color:#64748b;">
                后台持续推演，前端展示最近100次中的最优结果
            </div>
        </div>
    `;

    // ---------- 汇总表 ----------
    html += `
        <div class="card">
            <h2>📊 各推演方法正确率汇总</h2>
            <div class="summary-grid">
                ${Object.entries(rates).map(([method, rate]) => `
                    <div class="summary-item ${method === bestMethod ? 'highlight' : ''}">
                        <div class="rate">${(rate * 100).toFixed(0)}%</div>
                        <div class="label">${method === '胜平负' ? '🏆' : method === '让球胜平负' ? '⚽' : method === '总进球数' ? '📊' : method === '半全场' ? '🔄' : '🎯'} ${method}</div>
                        <div style="font-size:0.65rem; color:#94a3b8; margin-top:4px;">${stats[method].correct}/${stats[method].total}</div>
                    </div>
                `).join('')}
            </div>
            <div class="info-line">
                <span>✅ 最佳推演方法：<strong>${bestMethod}</strong>（正确率 ${(rates[bestMethod] * 100).toFixed(0)}%）</span>
                <span>📌 未开始比赛将使用此方法进行预测</span>
            </div>
        </div>
    `;

    // ---------- 已完赛表格 ----------
    html += `<div class="card"><h2>✅ 已完赛比赛（经多次推演，展示最优结果）</h2><table><thead><tr>
        <th>时间</th><th>比赛双方</th><th>结果</th>
        <th>胜平负</th><th>让球</th><th>总进球</th><th>半全场</th><th>比分</th><th>推演信息</th>
    </tr></thead><tbody>`;
    finished.forEach(item => {
        const m = item.match;
        const pred = item.pred;
        const actual = `${m.homeScore}:${m.awayScore}`;
        const [h, a] = actual.split(':').map(Number);
        const actualSPF = h > a ? '主队胜' : (h < a ? '客队胜' : '平局');
        const totalActual = h + a;
        const predTotal = parseInt(pred.total_goals.prediction);
        const isSPF = pred.win_draw_lose.prediction === actualSPF;
        const isRQ = pred.handicap.prediction === actualSPF;
        const isTG = !isNaN(predTotal) && predTotal === totalActual;
        const isHF = pred.half_full.prediction === actualSPF;
        const isCS = pred.correct_score.prediction === actual;

        html += `<tr>
            <td>${m.time}</td>
            <td><span class="flag">${flagMap[m.home] || '🏳️'}</span>${item.home} vs ${item.away}<span class="flag">${flagMap[m.away] || '🏳️'}</span></td>
            <td><span class="badge badge-${isSPF ? 'green' : 'red'}">${actual}</span></td>
            <td>${pred.win_draw_lose.prediction} <span class="badge badge-${isSPF ? 'green' : 'red'}">${isSPF ? '✓' : '✗'}</span></td>
            <td>${pred.handicap.prediction} <span class="badge badge-${isRQ ? 'green' : 'red'}">${isRQ ? '✓' : '✗'}</span></td>
            <td>${pred.total_goals.prediction}球 <span class="badge badge-${isTG ? 'green' : 'red'}">${isTG ? '✓' : '✗'}</span></td>
            <td>${pred.half_full.prediction} <span class="badge badge-${isHF ? 'green' : 'red'}">${isHF ? '✓' : '✗'}</span></td>
            <td>${pred.correct_score.prediction} <span class="badge badge-${isCS ? 'green' : 'red'}">${isCS ? '✓' : '✗'}</span></td>
            <td><span class="attempt-info">全局第 ${item.totalAttempts} 次 · 该场最优第 ${item.attempt} 次</span></td>
        </tr>`;
    });
    html += `</tbody></table><div class="caption-text">✓ 表示预测正确，✗ 表示预测错误</div></div>`;

    // ---------- 投注明细 ----------
    if (betRecords.length > 0) {
        html += `<div class="card"><h2>📋 投注明细（每玩法每场下注100元）</h2><table><thead><tr>
            <th>日期</th><th>比赛</th><th>玩法</th><th>预测</th><th>实际</th><th>赔率</th><th>盈亏</th>
        </tr></thead><tbody>`;
        betRecords.sort((a,b) => a.date.localeCompare(b.date) || a.method.localeCompare(b.method));
        betRecords.forEach(rec => {
            const profit = rec.profit;
            const cls = profit > 0 ? 'profit-positive' : (profit < 0 ? 'profit-negative' : 'profit-zero');
            html += `<tr>
                <td>${rec.date}</td>
                <td>${rec.match}</td>
                <td>${rec.method}</td>
                <td>${rec.prediction}</td>
                <td>${rec.actual}</td>
                <td>${rec.odds.toFixed(2)}</td>
                <td class="${cls}">${profit > 0 ? '+' : ''}${profit.toFixed(0)}</td>
            </tr>`;
        });
        html += `</tbody></table><div class="caption-text">每笔投注100元，盈利 = 100*(赔率-1)，亏损 = -100</div></div>`;
    }

    // ---------- 未完赛 ----------
    if (upcoming.length > 0) {
        html += `<div class="card"><h2>⏳ 未开始比赛（使用最佳推演方法「${bestMethod}」预测，共${upcoming.length}场）</h2><table><thead><tr>
            <th>时间</th><th>比赛双方</th><th>预测结果</th>
            <th>胜平负</th><th>让球</th><th>总进球</th><th>半全场</th><th>比分</th>
        </tr></thead><tbody>`;
        upcoming.forEach(item => {
            const m = item.match;
            const pred = item.pred;
            const isBest = (method) => method === bestMethod;

            html += `<tr>
                <td>${m.time}</td>
                <td><span class="flag">${flagMap[m.home] || '🏳️'}</span>${item.home} vs ${item.away}<span class="flag">${flagMap[m.away] || '🏳️'}</span></td>
                <td><span class="badge badge-yellow">待定</span></td>
                <td>${pred.win_draw_lose.prediction} ${isBest('胜平负') ? '⭐' : ''}</td>
                <td>${pred.handicap.prediction} ${isBest('让球胜平负') ? '⭐' : ''}</td>
                <td>${pred.total_goals.prediction}球 ${isBest('总进球数') ? '⭐' : ''}</td>
                <td>${pred.half_full.prediction} ${isBest('半全场') ? '⭐' : ''}</td>
                <td>${pred.correct_score.prediction} ${isBest('正确比分') ? '⭐' : ''}</td>
            </tr>`;
        });
        html += `</tbody></table><div style="margin-top:8px; font-size:0.8rem; color:#64748b;">⭐ 标记为「最佳推演方法（${bestMethod}）」的预测结果，其他仅供参考。</div></div>`;
    } else {
        html += `<div class="card"><p style="text-align:center; color:#94a3b8;">暂无未开始比赛</p></div>`;
    }

    html += `<div class="footer-note">数据来源：Football-Data.org · 预测由 DeepSeek 生成 · 后台持续推演，前端展示最近100次最优 · 投注为模拟</div>`;
    app.innerHTML = html;
}

// ---------- 启动 ----------
init();
</script>
</body>
</html>
