<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek · 世界杯智能推演</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 极致扁平化、干净清爽的设计 */
        body {
            margin: 0;
            padding: 24px;
            background-color: #f4f6f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #24292e;
        }
        
        .app-container {
            max-width: 1150px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 清爽头部 */
        .header {
            text-align: center;
            padding: 15px 0 10px 0;
            border-bottom: 1px solid #e1e4e8;
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            color: #1b1f23;
        }
        .header h1 i {
            color: #0366d6;
        }
        .header p {
            color: #586069;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        /* 大白卡片 */
        .card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            padding: 20px 24px;
            border: 1px solid #e1e4e8;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #1b1f23;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eaecef;
        }
        .card-title i {
            color: #0366d6;
        }

        /* 已完赛复盘（盈亏列表） */
        .match-row {
            display: flex;
            align-items: center;
            border-bottom: 1px solid #eaecef;
            padding: 10px 0;
        }
        .match-row:last-child { border-bottom: none; }
        
        .match-info {
            min-width: 80px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #586069;
            text-align: center;
            line-height: 1.4;
        }

        .bet-cells {
            flex: 1;
            display: flex;
            justify-content: space-around;
            text-align: center;
        }
        
        .bet-cell {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: 1px dashed #eaecef;
            padding: 0 6px;
        }
        .bet-cell:last-child { border-right: none; }
        
        .bc-pred { font-size: 0.85rem; font-weight: 600; color: #24292e; }
        .bc-odds { font-size: 0.7rem; color: #6a737d; margin: 2px 0; }
        .bc-profit { font-size: 0.85rem; font-weight: 700; }
        .bc-profit.positive { color: #28a745; }
        .bc-profit.negative { color: #d73a49; }

        .match-total {
            min-width: 50px;
            text-align: center;
            font-weight: 700;
            font-size: 0.9rem;
            padding-left: 10px;
        }
        .match-total.positive { color: #28a745; }
        .match-total.negative { color: #d73a49; }

        .disclaimer {
            font-size: 0.75rem;
            color: #6a737d;
            text-align: center;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #eaecef;
        }

        /* 即将开赛表格 */
        .table-wrap { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        th {
            text-align: center;
            padding: 12px 6px;
            color: #586069;
            font-weight: 600;
            border-bottom: 2px solid #e1e4e8;
            background: #f6f8fa;
        }
        td {
            text-align: center;
            padding: 12px 6px;
            border-bottom: 1px solid #eaecef;
            vertical-align: middle;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: #f6f8fa; }

        .match-team { font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .match-vs { color: #6a737d; font-size: 0.7rem; font-weight: 400; }
        .badge-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.65rem;
            font-weight: 600;
        }
        .badge-best { background: #fff3cd; color: #856404; }
        .badge-latest { background: #e1e4e8; color: #586069; }
        .pred-text { font-weight: 600; color: #0366d6; }
        .conf-text { background: #f6f8fa; padding: 2px 10px; border-radius: 12px; font-size: 0.75rem; color: #586069; display: inline-block; }

        /* 6 大资金分配卡片 */
        .bet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }
        .bet-card {
            background: #f6f8fa;
            border-radius: 10px;
            padding: 14px 16px;
            border: 1px solid #e1e4e8;
        }
        .bet-card-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: #586069;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }
        .bet-list { display: flex; flex-direction: column; gap: 4px; }
        .bet-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            padding: 3px 0;
            border-bottom: 1px dashed #eaecef;
        }
        .bet-item:last-child { border-bottom: none; }
        .bet-amount { font-weight: 700; color: #0366d6; }

        /* 历史推演报告（重点：单行内联判定，绝对对齐） */
        .review-table th { background: #f6f8fa; }
        
        .review-cell-content {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            white-space: nowrap; /* 强制在同一行显示，绝不换行 */
            width: 100%;
        }
        .review-pred {
            font-weight: 600;
            color: #0366d6;
        }
        .review-status-icon {
            font-size: 1.1rem;
            line-height: 1;
        }
        .review-status-icon.hit { color: #28a745; }
        .review-status-icon.miss { color: #d73a49; }

        /* 等待动画 */
        .loading-text {
            text-align: center;
            padding: 30px 0;
            color: #6a737d;
        }
        .loading-text i {
            margin-right: 8px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1><i class="fa-solid fa-robot"></i> DeepSeek · 世界杯智能推演</h1>
            <p>AI 直觉 + 泊松分布 + 凯利公式，全自动博弈</p>
        </div>

        <!-- 模块1：已完赛复盘 -->
        <div class="card">
            <div class="card-title"><i class="fa-solid fa-chart-line"></i> 已完赛 · 投注盈亏复盘</div>
            <div id="finished-list">
                <div class="loading-text"><i class="fa-solid fa-spinner"></i> 数据加载中...</div>
            </div>
            <div class="disclaimer">* 盈亏 = (赔率 - 1) × 100元，未中则亏损100元。</div>
        </div>

        <!-- 模块2：即将开赛预测 -->
        <div class="card">
            <div class="card-title"><i class="fa-regular fa-clock"></i> 即将开赛 · 赛前大预言</div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>对阵双方</th>
                            <th>状态</th>
                            <th>胜平负</th>
                            <th>让球</th>
                            <th>总进球</th>
                            <th>信心</th>
                        </tr>
                    </thead>
                    <tbody id="upcoming-list">
                        <tr><td colspan="7" class="loading-text"><i class="fa-solid fa-spinner"></i> AI 正在推演...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="bet-grid" id="bet-grids-container">
                <div class="loading-text" style="grid-column:1/-1; padding:15px;"><i class="fa-solid fa-spinner"></i> 计算资金分配中...</div>
            </div>
        </div>

        <!-- 模块3：历史推演报告 -->
        <div class="card">
            <div class="card-title"><i class="fa-solid fa-book-open"></i> 历史推演 · 回溯报告</div>
            <div class="table-wrap">
                <table class="review-table">
                    <thead>
                        <tr>
                            <th>比赛双方</th>
                            <th>实际比分</th>
                            <th>胜平负</th>
                            <th>让球</th>
                            <th>总进球</th>
                            <th>半全场</th>
                            <th>比分</th>
                        </tr>
                    </thead>
                    <tbody id="review-list">
                        <tr><td colspan="7" class="loading-text"><i class="fa-solid fa-spinner"></i> 生成推演历史...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_STATE = '/api/state';
        const API_REVIEW = '/api/review';

        // 1. 渲染已完赛盈亏
        function renderFinished(matches) {
            const container = document.getElementById('finished-list');
            if (!matches || matches.length === 0) {
                container.innerHTML = `<div class="loading-text">暂无完赛记录</div>`;
                return;
            }
            let html = '';
            for (const m of matches) {
                if (!m.pred || !m.odds) continue;
                const pred = m.pred, odds = m.odds;
                const actual = `${m.homeScore}:${m.awayScore}`;
                const homeWin = m.homeScore > m.awayScore;
                const isDraw = m.homeScore === m.awayScore;
                const awayWin = m.homeScore < m.awayScore;

                const getProfit = (playType, predVal, oddVal) => {
                    let profit = -100;
                    if (!oddVal || oddVal <= 0) return 0;
                    const oddNum = parseFloat(oddVal);
                    let isHit = false;
                    if (playType === '胜平负') isHit = (predVal === '主队胜' && homeWin) || (predVal === '平局' && isDraw) || (predVal === '客队胜' && awayWin);
                    else if (playType === '让球') { if(predVal === '主队赢盘' && homeWin) isHit = true; else if(predVal === '客队赢盘' && awayWin) isHit = true; }
                    else if (playType === '总进球' && parseInt(predVal) === m.homeScore + m.awayScore) isHit = true;
                    else if (playType === '半全场') {
                        const SPF_map = { '胜胜': '主队胜', '平胜': '主队胜', '负胜': '主队胜', '胜平': '平局', '平平': '平局', '负平': '平局', '胜负': '客队胜', '平负': '客队胜', '负负': '客队胜' };
                        const targetSPF = SPF_map[predVal];
                        if (targetSPF && ((targetSPF === '主队胜' && homeWin) || (targetSPF === '平局' && isDraw) || (targetSPF === '客队胜' && awayWin))) isHit = true;
                    }
                    else if (playType === '正确比分' && predVal === actual) isHit = true;
                    if (isHit) profit = (oddNum - 1) * 100;
                    return profit;
                };

                const cols = [
                    { name: '胜平负', pred: pred.win_draw_lose ? pred.win_draw_lose.prediction : '-', odd: odds.win },
                    { name: '让球', pred: pred.handicap ? pred.handicap.prediction : '-', odd: odds.h_odds },
                    { name: '进球', pred: pred.total_goals ? pred.total_goals.prediction : '-', odd: odds.total_odds },
                    { name: '半全场', pred: pred.half_full ? pred.half_full.prediction : '-', odd: odds.hf_odds },
                    { name: '比分', pred: pred.correct_score ? pred.correct_score.prediction : '-', odd: odds.cs_odds }
                ];

                let totalProfit = 0;
                let colHtml = cols.map(c => {
                    if (c.pred === '-') return `<div class="bet-cell"><div class="bc-pred">-</div><div class="bc-odds">-</div><div class="bc-profit">-</div></div>`;
                    const profit = getProfit(c.name, c.pred, c.odd);
                    totalProfit += profit;
                    return `<div class="bet-cell">
                        <div class="bc-pred">${c.pred}</div>
                        <div class="bc-odds">(${c.odd})</div>
                        <div class="bc-profit ${profit >= 0 ? 'positive' : 'negative'}">${profit >= 0 ? '+' : ''}${Math.round(profit)}</div>
                    </div>`;
                }).join('');

                const totalCls = totalProfit >= 0 ? 'positive' : 'negative';
                html += `
                    <div class="match-row">
                        <div class="match-info">${m.home}<br><span style="font-size:0.7rem;">vs</span><br>${m.away}</div>
                        <div class="bet-cells">${colHtml}</div>
                        <div class="match-total ${totalCls}">${totalProfit >= 0 ? '+' : ''}${Math.round(totalProfit)}</div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        // 2. 渲染即将开赛
        function renderUpcoming(upcoming, bets) {
            const tbody = document.getElementById('upcoming-list');
            if (!upcoming || upcoming.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="loading-text">等待赛前推演生成...</td></tr>`;
                return;
            }
            let html = '';
            for (const m of upcoming) {
                const best = m.best ? m.best.pred : {};
                const time = m.time || '--:--';
                html += `
                    <tr>
                        <td style="font-size:0.75rem; color:#586069;">${time}</td>
                        <td><div class="match-team"><span>${m.home}</span><span class="match-vs">VS</span><span>${m.away}</span></div></td>
                        <td><div class="badge-group"><span class="badge badge-latest">最新</span><span class="badge badge-best">最佳</span></div></td>
                        <td class="pred-text">${best.win_draw_lose ? best.win_draw_lose.prediction : '-'}</td>
                        <td class="pred-text">${best.handicap ? best.handicap.prediction : '-'}</td>
                        <td class="pred-text">${best.total_goals ? best.total_goals.prediction + '球' : '-'}</td>
                        <td><span class="conf-text">${m.best ? (m.best.confidence || 0) : 0}%</span></td>
                    </tr>
                `;
            }
            tbody.innerHTML = html;

            const gridContainer = document.getElementById('bet-grids-container');
            if (!bets || Object.keys(bets).length === 0) {
                gridContainer.innerHTML = `<div class="loading-text" style="grid-column:1/-1;">等待资金分配...</div>`;
                return;
            }
            const configs = [
                { key: 'upcomingBetsOverall', icon: 'fa-solid fa-crown', name: '综合最优策略' },
                { key: 'upcomingBetsWinDrawLose', icon: 'fa-solid fa-square-check', name: '胜平负专项' },
                { key: 'upcomingBetsHandicap', icon: 'fa-solid fa-handicap', name: '让球胜平负专项' },
                { key: 'upcomingBetsTotalGoals', icon: 'fa-solid fa-futbol', name: '总进球数专项' },
                { key: 'upcomingBetsHF', icon: 'fa-solid fa-arrow-right-arrow-left', name: '半全场专项' },
                { key: 'upcomingBetsCS', icon: 'fa-solid fa-bullseye', name: '正确比分专项' }
            ];
            let gridHtml = '';
            for (const cfg of configs) {
                const list = bets[cfg.key] || [];
                let itemHtml = list.map(item => `
                    <div class="bet-item"><span>${item.name}</span><span class="bet-amount">￥${item.amount}</span></div>
                `).join('');
                gridHtml += `
                    <div class="bet-card">
                        <div class="bet-card-title"><i class="${cfg.icon}"></i> ${cfg.name} <span style="font-weight:normal;color:#6a737d;">(100元)</span></div>
                        <div class="bet-list">${itemHtml || '<div style="color:#6a737d;font-size:0.75rem;">等待推演</div>'}</div>
                    </div>
                `;
            }
            gridContainer.innerHTML = gridHtml;
        }

        // 3. 渲染历史推演报告（将✅和❌内联到预测值旁边，并且绝对一行）
        function renderReviews(reviews) {
            const tbody = document.getElementById('review-list');
            if (!reviews || reviews.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="loading-text">暂无历史推演数据...</td></tr>`;
                return;
            }
            let html = '';
            for (const rev of reviews) {
                const getStatusHTML = (pred, isHit) => {
                    if (pred === '-') return `<span class="review-pred">-</span>`;
                    return `
                        <div class="review-cell-content">
                            <span class="review-pred">${pred}</span>
                            <span class="review-status-icon ${isHit ? 'hit' : 'miss'}">${isHit ? '✅' : '❌'}</span>
                        </div>
                    `;
                };
                html += `
                    <tr>
                        <td style="font-weight:600;">${rev.match}</td>
                        <td style="font-weight:600; color:#1b1f23;">${rev.actualScore}</td>
                        <td>${getStatusHTML(rev.predWDL, rev.isHitWDL)}</td>
                        <td>${getStatusHTML(rev.predHandicap, rev.isHitHandicap)}</td>
                        <td>${getStatusHTML(rev.predTG, rev.isHitTG)}</td>
                        <td>${getStatusHTML(rev.predHF, rev.isHitHF)}</td>
                        <td>${getStatusHTML(rev.predCS, rev.isHitCS)}</td>
                    </tr>
                `;
            }
            tbody.innerHTML = html;
        }

        // 4. 主入口
        async function loadDashboard() {
            try {
                const stateRes = await fetch(API_STATE);
                if (!stateRes.ok) throw new Error('接口连接超时');
                const stateData = await stateRes.json();

                renderFinished(stateData.finished || []);
                renderUpcoming(stateData.upcoming || [], {
                    upcomingBetsOverall: stateData.upcomingBetsOverall,
                    upcomingBetsWinDrawLose: stateData.upcomingBetsWinDrawLose,
                    upcomingBetsHandicap: stateData.upcomingBetsHandicap,
                    upcomingBetsTotalGoals: stateData.upcomingBetsTotalGoals,
                    upcomingBetsHF: stateData.upcomingBetsHF,
                    upcomingBetsCS: stateData.upcomingBetsCS
                });

                const reviewRes = await fetch(API_REVIEW);
                if (reviewRes.ok) {
                    const reviewData = await reviewRes.json();
                    renderReviews(reviewData.reviews || []);
                }

                setTimeout(() => { location.reload(); }, 180000);
            } catch (error) {
                document.body.innerHTML = `
                    <div style="display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column; background:#f4f6f9;">
                        <i class="fa-solid fa-circle-exclamation" style="font-size:3rem; color:#d73a49; margin-bottom:20px;"></i>
                        <h2 style="color:#1b1f23;">服务连接中断</h2>
                        <p style="color:#586069;">${error.message}</p>
                        <button onclick="location.reload()" style="margin-top:20px; background:#1b1f23; color:#fff; border:none; padding:12px 24px; border-radius:6px; font-weight:600; cursor:pointer;">重新加载</button>
                    </div>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
