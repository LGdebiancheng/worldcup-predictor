<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ DeepSeek 世界杯预测</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { font-family: 'Space Grotesk', sans-serif; }
        body { background-color: #f8fafc; transition: background 0.3s; }
        body.dark-mode { background-color: #0b0f19; color: #e2e8f0; }
        .glass-card {
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        body.dark-mode .glass-card { background: rgba(20,30,50,0.7); border: 1px solid rgba(255,255,255,0.05); }
        .rank-bar { background: linear-gradient(90deg, #3b82f6, #8b5cf6); }
        .flag-emoji { font-family: 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif; }
    </style>
</head>
<body>
<nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-md border-b border-gray-200 dark:bg-gray-900/80 dark:border-gray-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
            <div class="flex items-center space-x-2">
                <span class="text-2xl">⚽</span>
                <span class="font-bold text-xl text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600">DeepSeek 世界杯预测</span>
                <span class="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full">在线版</span>
            </div>
            <div class="flex items-center space-x-4">
                <span class="text-sm text-gray-500 hidden sm:inline">2026</span>
                <button id="themeToggle" class="p-2 rounded-full bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 text-gray-600">
                    <i id="themeIcon" class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </div>
</nav>
<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="text-center mb-10">
        <h1 class="text-3xl md:text-4xl font-bold text-gray-800 dark:text-white">
            🧠 DeepSeek <span class="text-blue-600">AI 胜率推演</span>
        </h1>
        <p class="text-gray-500 dark:text-gray-400 mt-2 flex items-center justify-center gap-2 flex-wrap">
            <span><i class="far fa-calendar-alt"></i> 模拟数据 · 2026-06-17</span>
            <span class="hidden sm:inline">|</span>
            <span class="bg-yellow-100 dark:bg-yellow-900/30 text-yellow-700 dark:text-yellow-300 px-3 py-0.5 rounded-full text-xs font-medium">
                <i class="fas fa-robot"></i> 由 DeepSeek 大模型实时生成
            </span>
        </p>
    </div>
    <div class="space-y-4 mb-12" id="matchList"></div>
    <div class="mb-8">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-xl font-bold text-gray-800 dark:text-white"><i class="fas fa-trophy text-yellow-500 mr-2"></i>预测收益榜</h2>
            <span class="text-xs text-gray-400">模拟数据</span>
        </div>
        <div class="glass-card rounded-2xl p-4 md:p-6 shadow-sm overflow-hidden">
            <table class="w-full text-sm">
                <thead class="text-gray-500 dark:text-gray-400 border-b border-gray-200 dark:border-gray-700">
                    <tr><th class="py-3 text-left font-medium">#</th><th class="py-3 text-left font-medium">用户</th><th class="py-3 text-left font-medium hidden sm:table-cell">场次</th><th class="py-3 text-right font-medium">收益 (¥)</th><th class="py-3 text-right font-medium hidden md:table-cell">胜率</th></tr>
                </thead>
                <tbody id="rankTableBody"></tbody>
            </table>
        </div>
    </div>
    <div class="text-center text-xs text-gray-400 dark:text-gray-600 border-t border-gray-200 dark:border-gray-800 pt-6 mt-6">
        <p>⚡ 预测结果由 DeepSeek 大模型生成。</p>
        <p class="mt-1">⚠️ 仅供技术交流与娱乐参考。</p>
    </div>
</main>
<script>
// 深色模式
(function() {
    let theme = 'light';
    try {
        const saved = localStorage.getItem('theme');
        if (saved === 'dark' || saved === 'light') theme = saved;
        else if (window.matchMedia?.('(prefers-color-scheme: dark)').matches) theme = 'dark';
    } catch(e) {}
    document.body.classList.toggle('dark-mode', theme === 'dark');
    const icon = document.getElementById('themeIcon');
    if (icon) icon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
})();
document.getElementById('themeToggle')?.addEventListener('click', function() {
    const body = document.body;
    const icon = document.getElementById('themeIcon');
    const isDark = body.classList.toggle('dark-mode');
    if (icon) icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
    try { localStorage.setItem('theme', isDark ? 'dark' : 'light'); } catch(e) {}
});

// 模拟比赛数据
const matchData = [
    { home: '巴西', away: '阿根廷', homeScore: 2, awayScore: 1, time: '03:00' },
    { home: '法国', away: '英格兰', homeScore: 1, awayScore: 1, time: '06:00' },
    { home: '德国', away: '西班牙', homeScore: 2, awayScore: 3, time: '09:00' },
    { home: '葡萄牙', away: '荷兰', homeScore: 0, awayScore: 2, time: '12:00' },
    { home: '意大利', away: '比利时', homeScore: 1, awayScore: 0, time: '15:00' },
];
const flagMap = {
    '巴西': '🇧🇷', '阿根廷': '🇦🇷', '法国': '🇫🇷', '英格兰': '🏴󠁧󠁢󠁥󠁮󠁧󠁿',
    '德国': '🇩🇪', '西班牙': '🇪🇸', '葡萄牙': '🇵🇹', '荷兰': '🇳🇱',
    '意大利': '🇮🇹', '比利时': '🇧🇪'
};

// 调用后端 API（不需要前端Key）
async function fetchPrediction(home, away) {
    try {
        const resp = await fetch('/api/predict', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ home, away })
        });
        const result = await resp.json();
        if (!result.success) throw new Error(result.error);
        return result.data;
    } catch (e) {
        return { result: '服务异常', homeScore: '?', awayScore: '?', analysis: e.message };
    }
}

async function renderMatches() {
    const container = document.getElementById('matchList');
    container.innerHTML = matchData.map((m, i) => `
        <div id="card-${i}" class="glass-card rounded-xl p-5 shadow-sm border border-gray-100/50 dark:border-gray-700/30">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div class="flex items-center gap-4 flex-wrap">
                    <div class="text-right">
                        <div class="text-2xl flag-emoji">${flagMap[m.home] || '🏳️'}</div>
                        <div class="font-bold text-gray-800 dark:text-white text-sm">${m.home}</div>
                    </div>
                    <div class="text-2xl md:text-3xl font-black text-gray-800 dark:text-white">
                        ${m.homeScore} <span class="text-gray-400 mx-1">:</span> ${m.awayScore}
                    </div>
                    <div class="text-left">
                        <div class="text-2xl flag-emoji">${flagMap[m.away] || '🏳️'}</div>
                        <div class="font-bold text-gray-800 dark:text-white text-sm">${m.away}</div>
                    </div>
                    <span class="text-xs text-gray-400">${m.time}</span>
                </div>
                <div class="flex items-center gap-2 text-sm text-gray-400 dark:text-gray-500" id="status-${i}">
                    <i class="fas fa-spinner fa-spin"></i> AI 预测中...
                </div>
            </div>
            <div id="pred-${i}" class="mt-3 pt-3 border-t border-gray-200/50 dark:border-gray-700/30 text-gray-500 text-sm">
                正在请求 DeepSeek...
            </div>
        </div>
    `).join('');

    for (let i = 0; i < matchData.length; i++) {
        const m = matchData[i];
        const pred = await fetchPrediction(m.home, m.away);
        document.getElementById(`status-${i}`).innerHTML = `<span class="text-green-500"><i class="fas fa-check-circle"></i> 完成</span>`;
        let color = 'bg-gray-500';
        if (pred.result?.includes('主队胜')) color = 'bg-green-500';
        else if (pred.result?.includes('客队胜')) color = 'bg-blue-500';
        else if (pred.result?.includes('平局')) color = 'bg-yellow-500';
        document.getElementById(`pred-${i}`).innerHTML = `
            <div class="flex flex-wrap items-center gap-3">
                <span class="text-xs font-semibold text-gray-500 dark:text-gray-400">🧠 DeepSeek</span>
                <span class="text-xs text-white ${color} px-2 py-0.5 rounded-full font-bold">${pred.result || '--'}</span>
                <span class="text-sm font-bold text-purple-600 dark:text-purple-400">${pred.homeScore ?? '?'} : ${pred.awayScore ?? '?'}</span>
                <span class="text-xs text-gray-500 dark:text-gray-400">${pred.analysis || ''}</span>
            </div>
        `;
    }
}

// 排行榜
const rankData = [
    { name: 'DeepSeek AI', count: 38, profit: 15800, rate: 82 },
    { name: '林亦 LYi', count: 42, profit: 11230, rate: 74 },
    { name: '预测大师', count: 35, profit: 9820, rate: 71 },
    { name: '足彩小王子', count: 40, profit: 8560, rate: 65 },
    { name: '数据狂人', count: 29, profit: 7230, rate: 69 },
];
function renderRanking() {
    const tbody = document.getElementById('rankTableBody');
    if (!tbody) return;
    tbody.innerHTML = '';
    rankData.forEach((item, index) => {
        const tr = document.createElement('tr');
        tr.className = 'border-b border-gray-100 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-gray-800/40';
        let medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `#${index+1}`;
        tr.innerHTML = `
            <td class="py-3 font-bold text-gray-600 dark:text-gray-400">${medal}</td>
            <td class="py-3 font-medium text-gray-800 dark:text-white">${item.name}</td>
            <td class="py-3 text-gray-500 dark:text-gray-400 hidden sm:table-cell">${item.count}场</td>
            <td class="py-3 text-right font-bold text-green-600 dark:text-green-400">+${item.profit.toLocaleString()}</td>
            <td class="py-3 text-right hidden md:table-cell">
                <div class="flex items-center justify-end gap-2">
                    <span class="text-sm font-medium text-gray-700 dark:text-gray-300">${item.rate}%</span>
                    <div class="w-16 h-1.5 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
                        <div class="h-full rank-bar" style="width: ${item.rate}%;"></div>
                    </div>
                </div>
            </td>
        `;
        tbody.appendChild(tr);
    });
}
renderRanking();
renderMatches();
</script>
</body>
</html>
