<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界杯预测推演</title>
    <!-- 引入极度顺眼的现代字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 纯粹的极简风格 */
        body {
            margin: 0;
            padding: 30px 15px;
            font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            background-color: #f5f7fa;
            color: #333333;
            min-height: 100vh;
        }

        /* 顶部 */
        .header {
            text-align: center;
            margin-bottom: 35px;
        }
        .header h1 {
            font-size: 2.2rem;
            font-weight: 600;
            color: #1a1a1a;
            margin: 0 0 5px 0;
            letter-spacing: 1px;
        }
        .header p {
            color: #888;
            margin: 0;
            font-size: 0.95rem;
        }

        /* 主容器 */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* 白底卡片 */
        .card {
            background: #ffffff;
            border-radius: 12px;
            padding: 20px 25px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border: 1px solid #e8ecf1;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #1a1a1a;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f0f0f0;
        }
        .card-title i {
            color: #3b82f6;
        }

        /* 极简表格 */
        .table-wrap { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
            color: #444;
        }
        th, td {
            padding: 14px 10px;
            text-align: center;
            border-bottom: 1px solid #f2f2f2;
        }
        th {
            font-weight: 600;
            color: #6b7280;
            background: #fafbfc;
            white-space: nowrap;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: #fafbfc; }

        .match-name { font-weight: 500; display: flex; justify-content: center; gap: 8px; }
        .vs-text { color: #9ca3af; }
        .pred-text { color: #2563eb; font-weight: 500; }
        .pred-conf { background: #f3f4f6; padding: 2px 10px; border-radius: 12px; font-size: 0.8rem; color: #555; }
        .time-text { color: #888; font-size: 0.85rem; }

        /* 资金分配条 */
        .bet-list { display: flex; flex-direction: column; gap: 8px; }
        .bet-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 10px;
            background: #fafbfc;
            border-radius: 6px;
            border: 1px solid #f0f0f0;
        }
        .bet-item .amount {
            font-weight: 600;
            color: #2563eb;
        }

        /* 复盘合并状态（修复你的痛点） */
        .review-cell {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: center;
            justify-content: center;
        }
        .review-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
        }
        .status-icon {
            font-weight: 600;
        }
        .status-icon.correct { color: #16a34a; }
        .status-icon.wrong { color: #dc2626; }

        /* 等待状态 */
        .loading-state { text-align: center; color: #888; padding: 30px 0; }
        .loading-state i { margin-right: 8px; color: #3b82f6; }

        @media (max-width: 600px) {
            .header h1 { font-size: 1.6rem; }
            th, td { font-size: 0.8rem; padding: 10px 5px; }
            .container { gap: 15px; }
        }
    </style>
</head>
<body>

    <!-- 简洁的头部 -->
    <div class="header">
        <h1><i class="fa-solid fa-futbol" style="color:#2563eb; margin-right: 6px;"></i> AI 世界杯推演</h1>
        <p>自动博弈分析 · 半全场/比分精准预测</p>
    </div>

    <div class="container">
        
        <!-- 即将开赛推演表 -->
        <div class="card">
            <div class="card-title"><i class="fa-solid fa-calendar-day"></i> 即将开赛 · 推演报告</div>
            <div class="table-wrap">
                <table id="upcoming-table">
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>对阵</th>
                            <th>半全场</th>
                            <th>正确比分</th>
                            <th>信心度</th>
                        </tr>
                    </thead>
                    <tbody id="upcoming-tbody">
                        <tr><td colspan="5" class="loading-state"><i class="fa-solid fa-spinner fa-spin"></i> 正在推演未来数据...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 外部交叉验证 -->
        <div class="card">
            <div class="card-title"><i class="fa-regular fa-eye"></i> 外部平台交叉验证</div>
            <div class="table-wrap">
                <table id="external-table">
                    <thead id="external-thead"></thead>
                    <tbody id="external-tbody">
                        <tr><td colspan="4" class="loading-state"><i class="fa-solid fa-spinner fa-spin"></i> 正在抓取外部数据...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 6 大 100 元投注策略 -->
        <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:15px;">
            <div class="card"><div class="card-title"><i class="fa-solid fa-crown"></i> 综合最优 (100元)</div><div class="bet-list" id="list-overall"></div></div>
            <div class="card"><div class="card-title"><i class="fa-solid fa-check-square"></i> 胜平负 (100元)</div><div class="bet-list" id="list-wdl"></div></div>
            <div class="card"><div class="card-title"><i class="fa-solid fa-handicap"></i> 让球胜平负 (100元)</div><div class="bet-list" id="list-hdcp"></div></div>
            <div class="card"><div class="card-title"><i class="fa-solid fa-futbol"></i> 总进球数 (100元)</div><div class="bet-list" id="list-tg"></div></div>
            <div class="card"><div class="card-title"><i class="fa-solid fa-arrows-left-right"></i> 半全场 (100元)</div><div class="bet-list" id="list-hf"></div></div>
            <div class="card"><div class="card-title"><i class="fa-solid fa-bullseye"></i> 正确比分 (100元)</div><div class="bet-list" id="list-cs"></div></div>
        </div>

        <!-- 历史复盘报告（已解决痛点） -->
        <div class="card">
            <div class="card-title"><i class="fa-solid fa-clock-rotate-left"></i> 历史推演 · 复盘总结</div>
            <div class="table-wrap">
                <table id="review-table">
                    <thead>
                        <tr>
                            <th>对阵</th>
                            <th>实际比分</th>
                            <th>推演半全场 / 比分</th>
                            <th>判定结果</th>
                        </tr>
                    </thead>
                    <tbody id="review-tbody">
                        <tr><td colspan="4" class="loading-state"><i class="fa-solid fa-spinner fa-spin"></i> 正在回溯过往战绩...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const API_STATE = '/api/state';
        const API_REVIEW = '/api/review';

        function renderBetBoard(listId, bets) {
            const container = document.getElementById(listId);
            if (!bets || bets.length === 0) {
                container.innerHTML = `<div class="loading-state"><i class="fa-solid fa-spinner fa-spin"></i> 计算中...</div>`;
                return;
            }
            container.innerHTML = bets.map(item => `
                <div class="bet-item">
                    <span>${item.name}</span>
                    <span class="amount">￥${item.amount}</span>
                </div>
            `).join('');
        }

        function renderUpcomingMatches(upcoming) {
            const tbody = document.getElementById('upcoming-tbody');
            if (!upcoming || upcoming.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="loading-state">等待数据...</td></tr>`;
                return;
            }
            let html = '';
            for (const match of upcoming) {
                const time = match.time || '--:--';
                const home = match.home || '待定';
                const away = match.away || '待定';
                const best = match.best || {};
                const predHF = best.pred?.half_full?.prediction || '待定';
                const predCS = best.pred?.correct_score?.prediction || '待定';
                const confidence = best.confidence || 0;
                html += `<tr>
                    <td class="time-text">${time}</td>
                    <td class="match-name">${home} <span class="vs-text">VS</span> ${away}</td>
                    <td class="pred-text">${predHF}</td>
                    <td class="pred-text">${predCS}</td>
                    <td><span class="pred-conf">${confidence}%</span></td>
                </tr>`;
            }
            tbody.innerHTML = html;
        }

        function renderExternalTable(data) {
            const thead = document.getElementById('external-thead');
            const tbody = document.getElementById('external-tbody');
            if (!data || !data.predictions || data.predictions.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="loading-state">等待外部信号接入...</td></tr>`;
                return;
            }
            let hhtml = `<tr><th>${data.aiNames[0]||'比赛'}</th>`;
            for (let i = 1; i < data.aiNames.length; i++) {
                hhtml += `<th>${data.aiNames[i]}</th>`;
            }
            hhtml += `</tr>`;
            thead.innerHTML = hhtml;

            let bhtml = '';
            for (const row of data.predictions) {
                let rhtml = `<td class="match-name" style="justify-content:start;">${row.match}</td>`;
                for (const item of row.aiData) {
                    rhtml += `<td style="font-size:0.9rem;">${item}</td>`;
                }
                bhtml += `<tr>${rhtml}</tr>`;
            }
            tbody.innerHTML = bhtml;
        }

        async function renderReviews() {
            try {
                const res = await fetch(API_REVIEW);
                const data = await res.json();
                const tbody = document.getElementById('review-tbody');
                if (!data.reviews || data.reviews.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="loading-state">暂无历史推演记录</td></tr>`;
                    return;
                }
                let html = '';
                for (const rev of data.reviews) {
                    // 合并半全场和比分的展示，将√和×整合在旁边
                    const hfStr = `半全场: ${rev.predictedHF}`;
                    const csStr = `比分: ${rev.predictedCS}`;
                    
                    const hfStatus = rev.isHitHF ? `<span class="status-icon correct">✅ 正确</span>` : `<span class="status-icon wrong">❌ 错误</span>`;
                    const csStatus = rev.isHitCS ? `<span class="status-icon correct">✅ 正确</span>` : `<span class="status-icon wrong">❌ 错误</span>`;

                    html += `<tr>
                        <td style="font-weight:500;">${rev.match}</td>
                        <td>${rev.actualScore}</td>
                        <td>
                            <div style="display:flex; flex-direction:column; gap:4px; align-items:center;">
                                <span class="pred-text">${hfStr}</span>
                                <span class="pred-text">${csStr}</span>
                            </div>
                        </td>
                        <td>
                            <div style="display:flex; flex-direction:column; gap:4px; align-items:center;">
                                <span style="font-size:0.9rem;">${hfStatus}</span>
                                <span style="font-size:0.9rem;">${csStatus}</span>
                            </div>
                        </td>
                    </tr>`;
                }
                tbody.innerHTML = html;
            } catch (e) {
                // 忽略错误
            }
        }

        async function loadDashboard() {
            try {
                const res = await fetch(API_STATE);
                if (!res.ok) throw new Error('数据异常');
                const data = await res.json();
                
                renderUpcomingMatches(data.upcoming || []);
                renderBetBoard('list-overall', data.upcomingBetsOverall);
                renderBetBoard('list-wdl', data.upcomingBetsWinDrawLose);
                renderBetBoard('list-hdcp', data.upcomingBetsHandicap);
                renderBetBoard('list-tg', data.upcomingBetsTotalGoals);
                renderBetBoard('list-hf', data.upcomingBetsHF);
                renderBetBoard('list-cs', data.upcomingBetsCS);
                renderExternalTable(data.externalPredictions);
                
                // 拉取复盘
                await renderReviews();

                // 3分钟自动刷新
                setTimeout(() => { location.reload(); }, 180000);
            } catch (error) {
                document.body.innerHTML = `
                    <div style="display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column; background:#f5f7fa; gap:10px;">
                        <h2 style="color:#555;">系统连接异常</h2>
                        <p style="color:#888;">${error.message}</p>
                        <button onclick="location.reload()" style="padding:10px 20px; background:#2563eb; color:#fff; border:none; border-radius:6px; cursor:pointer;">尝试重新加载</button>
                    </div>
                `;
            }
        }
        document.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
